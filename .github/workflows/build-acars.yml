name: Build ACARS Windows EXE

on:
  push:
    branches: [main, master]
    paths:
      - 'acars/**'
      - '.github/workflows/build-acars.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install all workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ACARS
        run: pnpm --filter kingfisher-acars build

      - uses: actions/upload-artifact@v4
        with:
          name: Kingfisher-ACARS-Windows
          path: acars/release/**/*.exe
